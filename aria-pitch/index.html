<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARIA — Sales Pitch · Integrated IT Support Inc.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a0908; overflow: hidden; }
    #root { position: fixed; inset: 0; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root" data-screen-label="ARIA Sales Pitch"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="scene-helpers.jsx"></script>
  <script type="text/babel" src="scene-1-chaos.jsx"></script>
  <script type="text/babel" src="scene-2-cost.jsx"></script>
  <script type="text/babel" src="scene-3-reveal.jsx"></script>
  <script type="text/babel" src="scene-4-tiers.jsx"></script>
  <script type="text/babel" src="scene-5-browser.jsx"></script>
  <script type="text/babel" src="scene-6-cta.jsx"></script>

  <script type="text/babel">
    function App() {
      const time = 0;
      // Update the data-screen-label with current second for comment context
      const Labeler = () => {
        const t = useTime();
        React.useEffect(() => {
          const root = document.getElementById('root');
          if (root) root.setAttribute('data-screen-label', `ARIA Sales Pitch — ${Math.floor(t)}s`);
        }, [Math.floor(t)]);
        return null;
      };

      return (
        <Stage width={1920} height={1080} duration={80} background="#0a0908" persistKey="aria-pitch">
          <Labeler />
          <Scene1Chaos start={0} end={10} />
          <Scene2Cost start={10} end={22} />
          <Scene3Reveal start={22} end={32} />
          <Scene4Tiers start={32} end={48} />
          <Scene5Browser start={48} end={58} />
          <Scene6Stats start={58} end={68} />
          <Scene7CTA start={68} end={80} />
        </Stage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
