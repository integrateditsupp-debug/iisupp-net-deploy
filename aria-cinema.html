<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ARIA — Stats & Purpose</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-2: #111113;
    --fg: #f4f1ea;
    --dim: #8a857c;
    --accent: oklch(72% 0.14 75);
    --line: rgba(244,241,234,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--fg); font-family: 'JetBrains Mono', ui-monospace, monospace; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; display: flex; flex-direction: column; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.93 0 0 0 0 0.88 0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.5; mix-blend-mode: overlay;
  }
  header { display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; border-bottom: 1px solid var(--line); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
  header .brand { display: flex; align-items: center; gap: 10px; color: var(--fg); }
  header .brand .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  header nav { display: flex; gap: 24px; }
  header nav span { opacity: 0.6; }
  header a { color: inherit; text-decoration: none; }
  main { flex: 1; display: grid; place-items: center; padding: 48px 32px; }
  .stage { width: 100%; max-width: 1160px; }
  .meta-row { display: flex; justify-content: space-between; align-items: end; margin-bottom: 28px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
  .meta-row .left { display: flex; gap: 32px; }
  .meta-row .left b { color: var(--fg); font-weight: 500; }
  .title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: clamp(48px, 7vw, 96px); line-height: 0.95; letter-spacing: -0.01em; color: var(--fg); margin-bottom: 6px; font-weight: 400; }
  .title em { color: var(--accent); font-style: normal; font-family: 'JetBrains Mono', monospace; font-size: 0.35em; vertical-align: super; letter-spacing: 0.1em; }
  .kicker { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-bottom: 20px; }
  .kicker::before { content: '— '; color: var(--accent); }
  .player { position: relative; aspect-ratio: 16/9; background: var(--bg-2); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; box-shadow: 0 40px 80px -30px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.02) inset; }
  .player video { width: 100%; height: 100%; display: block; object-fit: cover; }
  .player::before, .player::after, .corners > span { content: ''; position: absolute; width: 14px; height: 14px; border-color: var(--accent); pointer-events: none; z-index: 3; }
  .player::before { top: 10px; left: 10px; border-top: 1px solid; border-left: 1px solid; }
  .player::after { top: 10px; right: 10px; border-top: 1px solid; border-right: 1px solid; }
  .corners .bl { bottom: 10px; left: 10px; border-bottom: 1px solid; border-left: 1px solid; }
  .corners .br { bottom: 10px; right: 10px; border-bottom: 1px solid; border-right: 1px solid; }
  .controls { position: absolute; left: 0; right: 0; bottom: 0; padding: 18px 20px 16px; background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0)); display: flex; flex-direction: column; gap: 10px; opacity: 0; transition: opacity 0.25s ease; z-index: 4; }
  .player:hover .controls, .player.paused .controls, .player:focus-within .controls { opacity: 1; }
  .track { height: 3px; background: rgba(255,255,255,0.12); cursor: pointer; position: relative; border-radius: 2px; }
  .track .buffered { position: absolute; left:0; top:0; bottom:0; background: rgba(255,255,255,0.18); border-radius: 2px; }
  .track .progress { position: absolute; left:0; top:0; bottom:0; background: var(--accent); border-radius: 2px; }
  .track .thumb { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 0 4px rgba(0,0,0,0.4); }
  .row { display: flex; align-items: center; gap: 16px; color: var(--fg); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }
  .row .spacer { flex: 1; }
  button.ctrl { background: transparent; border: 0; color: var(--fg); cursor: pointer; width: 36px; height: 36px; display: grid; place-items: center; border-radius: 50%; transition: background 0.15s; }
  button.ctrl:hover { background: rgba(255,255,255,0.08); }
  button.ctrl svg { width: 16px; height: 16px; fill: currentColor; }
  .time { color: var(--dim); }
  .time .now { color: var(--fg); }
  .bigplay { position: absolute; inset: 0; display: grid; place-items: center; z-index: 2; background: rgba(10,10,11,0.35); transition: opacity 0.25s; cursor: pointer; }
  .bigplay.hidden { opacity: 0; pointer-events: none; }
  .bigplay .ring { width: 96px; height: 96px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.4); display: grid; place-items: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); background: rgba(0,0,0,0.2); transition: transform 0.3s, border-color 0.3s; }
  .bigplay:hover .ring { transform: scale(1.08); border-color: var(--accent); }
  .bigplay svg { width: 28px; height: 28px; fill: var(--fg); margin-left: 4px; }
  .strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); margin-top: 32px; }
  .strip > div { background: var(--bg); padding: 18px 20px; }
  .strip .k { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
  .strip .v { font-family: 'Instrument Serif', serif; font-size: 28px; color: var(--fg); }
  footer { border-top: 1px solid var(--line); padding: 20px 32px; display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); }
  footer .pulse { display: flex; align-items: center; gap: 8px; }
  footer .pulse::before { content:''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; box-shadow: 0 0 10px var(--accent); } }
  @media (max-width: 720px) {
    header { padding: 14px 20px; }
    header nav { display: none; }
    main { padding: 28px 16px; }
    .meta-row { flex-direction: column; align-items: start; gap: 12px; }
    .strip { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>
<header>
  <div class="brand"><a href="/"><span class="dot"></span> <span>ARIA / Console</span></a></div>
  <nav><a href="/"><span>Home</span></a><a href="/aria"><span>ARIA</span></a><a href="/aria?view=plans"><span>Plans</span></a><a href="/services.html"><span>Services</span></a><a href="/about"><span>About</span></a></nav>
  <div>Rec. 04 · 05.2026</div>
</header>
<main>
  <div class="stage">
    <div class="kicker">Briefing 04 — Field Report</div>
    <h1 class="title">Stats &amp; Purpose<em>↗</em></h1>
    <div class="meta-row">
      <div class="left">
        <div><b>Length</b> · 02:14</div>
        <div><b>Codec</b> · H.264</div>
        <div><b>Source</b> · aria.mp4</div>
      </div>
      <div>Press <b style="color:var(--fg)">SPACE</b> to play</div>
    </div>
    <div class="player" id="player">
      <video id="vid" preload="metadata" playsinline>
        <source src="/assets/video/aria-stats-and-purpose.mp4" type="video/mp4" />
      </video>
      <div class="corners"><span class="bl"></span><span class="br"></span></div>
      <div class="bigplay" id="bigplay">
        <div class="ring"><svg viewBox="0 0 24 24"><path d="M6 4l14 8L6 20V4z"/></svg></div>
      </div>
      <div class="controls" id="controls">
        <div class="track" id="track">
          <div class="buffered" id="buffered"></div>
          <div class="progress" id="progress"></div>
          <div class="thumb" id="thumb" style="left:0"></div>
        </div>
        <div class="row">
          <button class="ctrl" id="playbtn" aria-label="Play/Pause"><svg id="playicon" viewBox="0 0 24 24"><path d="M6 4l14 8L6 20V4z"/></svg></button>
          <div class="time"><span class="now" id="now">0:00</span> / <span id="dur">0:00</span></div>
          <div class="spacer"></div>
          <button class="ctrl" id="mutebtn" aria-label="Mute"><svg id="muteicon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/></svg></button>
          <button class="ctrl" id="fsbtn" aria-label="Fullscreen"><svg viewBox="0 0 24 24"><path d="M5 5h5V3H3v7h2V5zm0 14v-5H3v7h7v-2H5zm14-14h-5V3h7v7h-2V5zm0 14h-5v2h7v-7h-2v5z"/></svg></button>
        </div>
      </div>
    </div>
    <div class="strip">
      <div><div class="k">Section</div><div class="v">Stats</div></div>
      <div><div class="k">Tone</div><div class="v">Briefing</div></div>
      <div><div class="k">Format</div><div class="v">16:9</div></div>
      <div><div class="k">Channel</div><div class="v">Internal</div></div>
    </div>
  </div>
</main>
<footer>
  <div class="pulse">Signal live</div>
  <div>ARIA / 2026</div>
  <div>Console v0.4</div>
</footer>
<script>
  const v = document.getElementById('vid');
  const player = document.getElementById('player');
  const playbtn = document.getElementById('playbtn');
  const playicon = document.getElementById('playicon');
  const big = document.getElementById('bigplay');
  const mute = document.getElementById('mutebtn');
  const muteicon = document.getElementById('muteicon');
  const fs = document.getElementById('fsbtn');
  const track = document.getElementById('track');
  const prog = document.getElementById('progress');
  const buf = document.getElementById('buffered');
  const thumb = document.getElementById('thumb');
  const now = document.getElementById('now');
  const dur = document.getElementById('dur');
  const playIconSvg = '<path d="M6 4l14 8L6 20V4z"/>';
  const pauseIconSvg = '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
  const volIconSvg = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/>';
  const muteIconSvg = '<path d="M3 9v6h4l5 5V4L7 9H3zm12 7l3-3 3 3 1.4-1.4-3-3 3-3L21 7l-3 3-3-3-1.4 1.4 3 3-3 3z"/>';
  function fmt(t) { if (!isFinite(t)) return '0:00'; const m = Math.floor(t/60); const s = Math.floor(t%60).toString().padStart(2,'0'); return m+':'+s; }
  function toggle() { if (v.paused) { v.play(); } else { v.pause(); } }
  playbtn.addEventListener('click', toggle);
  big.addEventListener('click', toggle);
  v.addEventListener('play', () => { playicon.innerHTML = pauseIconSvg; big.classList.add('hidden'); player.classList.remove('paused'); });
  v.addEventListener('pause', () => { playicon.innerHTML = playIconSvg; big.classList.remove('hidden'); player.classList.add('paused'); });
  v.addEventListener('loadedmetadata', () => { dur.textContent = fmt(v.duration); });
  v.addEventListener('timeupdate', () => {
    const p = (v.currentTime / v.duration) * 100 || 0;
    prog.style.width = p + '%';
    thumb.style.left = p + '%';
    now.textContent = fmt(v.currentTime);
  });
  v.addEventListener('progress', () => {
    if (v.buffered.length) buf.style.width = ((v.buffered.end(v.buffered.length-1) / v.duration) * 100) + '%';
  });
  track.addEventListener('click', (e) => {
    const r = track.getBoundingClientRect();
    v.currentTime = ((e.clientX - r.left) / r.width) * v.duration;
  });
  mute.addEventListener('click', () => {
    v.muted = !v.muted;
    muteicon.innerHTML = v.muted ? muteIconSvg : volIconSvg;
  });
  fs.addEventListener('click', () => {
    if (!document.fullscreenElement) player.requestFullscreen && player.requestFullscreen();
    else document.exitFullscreen && document.exitFullscreen();
  });
  document.addEventListener('keydown', (e) => {
    const ae = document.activeElement;
    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.isContentEditable)) return;
    if (e.code === 'Space') { e.preventDefault(); toggle(); }
    if (e.code === 'KeyM') mute.click();
    if (e.code === 'KeyF') fs.click();
    if (e.code === 'ArrowRight') v.currentTime = Math.min(v.duration, v.currentTime + 5);
    if (e.code === 'ArrowLeft') v.currentTime = Math.max(0, v.currentTime - 5);
  });
  v.addEventListener('timeupdate', () => { try { localStorage.setItem('aria_t', v.currentTime); } catch (e) {} });
  v.addEventListener('loadedmetadata', () => {
    try { const t = parseFloat(localStorage.getItem('aria_t') || '0'); if (t > 0 && t < v.duration - 1) v.currentTime = t; } catch (e) {}
  });

  // Graceful 404 fallback: if video can't load, show 'Briefing — coming soon' in the play ring instead of empty black
  v.addEventListener('error', function(){
    var big = document.getElementById('bigplay');
    if (big) {
      big.innerHTML = '<div style="text-align:center;color:#8a857c;font-family:JetBrains Mono,monospace;letter-spacing:0.16em;text-transform:uppercase;"><div style="color:#f1dca7;font-size:13px;letter-spacing:0.22em;margin-bottom:10px;">Briefing</div><div style="font-size:10px;opacity:0.75;">Coming soon</div></div>';
      big.style.cursor = 'default';
      big.onclick = null;
    }
  });
  // Treat source-error on the <source> element the same way (Chrome sometimes dispatches there)
  var src = v.querySelector('source');
  if (src) src.addEventListener('error', function(){ v.dispatchEvent(new Event('error')); });
</script>
</body>
</html>
