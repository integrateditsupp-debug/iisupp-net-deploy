<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ARIA — Cinematic Demo</title>
<link rel="stylesheet" href="aria-tokens.css"/>
<style>
  html, body { margin:0; padding:0; background:#050402; color:#EDE6D6; height:100%; overflow:hidden; }
  #root { height:100%; }
  /* hide playback bar's gap visually so the video feels cinematic */
</style>
</head>
<body>
<div id="root"></div>

<!-- Floating recorder: captures the demo as a downloadable video file -->
<div id="rec-bar" style="position:fixed; bottom:14px; right:14px; z-index:60; display:flex; gap:8px; align-items:center; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.16em; color:#E8C988;">
  <button id="rec-btn" style="background:rgba(11,9,7,0.85); border:1px solid #C9A567; color:#E8C988; padding:8px 14px; border-radius:999px; cursor:pointer; backdrop-filter:blur(8px);">● RECORD VIDEO</button>
  <span id="rec-status" style="opacity:0.6;"></span>
</div>
<script>
(function(){
  const btn = document.getElementById('rec-btn');
  const stat = document.getElementById('rec-status');
  let rec=null, chunks=[], stream=null, startedAt=0, timer=null;
  function fmt(s){ s=Math.floor(s); return String(Math.floor(s/60)).padStart(2,'0')+":"+String(s%60).padStart(2,'0'); }
  async function start(){
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({ video:{ frameRate:30 }, audio:true });
    } catch(e){ stat.textContent = "permission denied"; return; }
    chunks=[];
    const types=["video/mp4;codecs=h264,aac","video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm"];
    const mt=types.find(t=>MediaRecorder.isTypeSupported(t)) || "";
    rec = new MediaRecorder(stream, mt?{mimeType:mt,videoBitsPerSecond:8_000_000}:{videoBitsPerSecond:8_000_000});
    rec.ondataavailable = e=>{ if(e.data.size) chunks.push(e.data); };
    rec.onstop = ()=>{
      const blob = new Blob(chunks, { type: rec.mimeType||"video/webm" });
      const ext = (rec.mimeType||"").includes("mp4") ? "mp4" : "webm";
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = "ARIA-cinematic-demo."+ext; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 4000);
      stream.getTracks().forEach(t=>t.stop());
      btn.textContent="● RECORD VIDEO"; btn.style.color="#E8C988"; btn.style.borderColor="#C9A567";
      stat.textContent = "saved · "+ext.toUpperCase()+(ext==="webm"?" (convert to mp4 with any free tool)":"");
      clearInterval(timer);
    };
    rec.start(250);
    startedAt = Date.now();
    btn.textContent="■ STOP & DOWNLOAD"; btn.style.color="#D9665A"; btn.style.borderColor="#D9665A";
    stat.textContent="recording…";
    timer=setInterval(()=>{ stat.textContent="recording · "+fmt((Date.now()-startedAt)/1000); }, 250);
    stream.getVideoTracks()[0].onended = ()=>{ if(rec && rec.state!=="inactive") rec.stop(); };
  }
  btn.onclick = ()=>{ if(rec && rec.state!=="inactive") rec.stop(); else start(); };
})();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="aria-shared.jsx"></script>
<script type="text/babel" src="aria-motion.jsx"></script>
<script type="text/babel" src="aria-audio.jsx"></script>
<script type="text/babel" src="aria-cinematic.jsx"></script>

<script type="text/babel">
const App = () => (
  <React.Fragment>
    <Stage width={1600} height={900} duration={150} background="#050402" autoplay={true} loop={true} persistKey="aria-demo-v2">
      <AriaDemo/>
    </Stage>
    <AudioEnableOverlay/>
  </React.Fragment>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
