<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA Operations Floor · IIS</title>
<style>
  :root {
    --bg:#050810; --panel:#0a121e; --panel2:#0d1825; --border:#1a2b35; --border2:#243a47;
    --text:#d8e0e6; --muted:#6b7c87; --dim:#98a8b3; --teal:#2dd4bf; --teal2:#14b8a6;
    --crit:#ef4444; --high:#f59e0b; --norm:#3b82f6; --low:#64748b;
    --ok:#10b981; --warn:#f59e0b; --err:#ef4444;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    --sans:'Inter', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }
  a { color:var(--teal); text-decoration:none; }
  /* LOGIN */
  #login { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  #login .card { background:var(--panel); border:1px solid var(--border); padding:32px; max-width:400px; width:100%; border-radius:4px; }
  #login h1 { font-family:var(--mono); font-size:14px; letter-spacing:3px; color:var(--teal); margin:0 0 24px 0; }
  #login input { width:100%; background:var(--bg); border:1px solid var(--border2); color:var(--text); padding:12px; font-family:var(--mono); font-size:13px; margin-bottom:12px; border-radius:2px; }
  #login button { width:100%; background:var(--teal); border:none; color:#000; padding:12px; font-family:var(--mono); font-size:12px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border-radius:2px; }
  #login button:hover { background:var(--teal2); }
  #login .err { color:var(--err); font-size:12px; margin-top:8px; min-height:16px; }

  /* APP */
  #app { display:none; padding:24px; max-width:1600px; margin:0 auto; }
  .header { display:flex; justify-content:space-between; align-items:center; padding-bottom:16px; border-bottom:1px solid var(--border); margin-bottom:24px; }
  .header h1 { font-family:var(--mono); font-size:13px; letter-spacing:3px; color:var(--teal); margin:0; }
  .header .meta { font-family:var(--mono); font-size:10px; color:var(--muted); }
  .btn { background:transparent; border:1px solid var(--border2); color:var(--text); padding:8px 14px; font-family:var(--mono); font-size:10px; letter-spacing:2px; cursor:pointer; border-radius:2px; }
  .btn:hover { border-color:var(--teal); color:var(--teal); }
  .btn-primary { background:var(--teal); color:#000; border-color:var(--teal); }
  .btn-primary:hover { background:var(--teal2); border-color:var(--teal2); color:#000; }

  /* LAYOUT */
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:20px; }
  .panel { background:var(--panel); border:1px solid var(--border); padding:18px; border-radius:4px; }
  .panel h2 { font-family:var(--mono); font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin:0 0 14px 0; }

  /* OFFICE */
  .office { background:linear-gradient(180deg, #08111c 0%, #050810 100%); border:1px solid var(--border); border-radius:4px; padding:0; overflow:hidden; margin-bottom:20px; }
  .office-svg { display:block; width:100%; height:auto; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes orbit { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  @keyframes typing { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-2px); } }
  .seat-active { animation: pulse 1.6s ease-in-out infinite; }
  .seat-typing { animation: typing 0.8s ease-in-out infinite; }

  /* GAUGE */
  .gauge { text-align:center; padding:8px 0; }
  .gauge .num { font-family:var(--mono); font-size:42px; color:var(--teal); font-weight:300; line-height:1; }
  .gauge .lbl { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:6px; }
  .bar { height:6px; background:var(--bg); border:1px solid var(--border); margin-top:8px; border-radius:3px; overflow:hidden; }
  .bar > div { height:100%; background:linear-gradient(90deg, var(--teal2), var(--teal)); transition:width 600ms ease; }

  /* AGENTS */
  .agent-row { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px dashed var(--border); }
  .agent-row:last-child { border-bottom:none; }
  .agent-name { font-family:var(--mono); font-size:11px; color:var(--text); width:110px; flex-shrink:0; }
  .agent-name .role { color:var(--muted); font-size:9px; display:block; margin-top:1px; }
  .agent-bar { flex:1; height:5px; background:var(--bg); border:1px solid var(--border); border-radius:2px; overflow:hidden; }
  .agent-bar > div { height:100%; background:var(--teal); transition:width 600ms ease; }
  .agent-pct { font-family:var(--mono); font-size:10px; color:var(--teal); width:40px; text-align:right; }

  /* TICKETS */
  .ticket { background:var(--panel2); border:1px solid var(--border); border-left-width:3px; padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:border-color 200ms; border-radius:3px; }
  .ticket:hover { border-color:var(--teal); }
  .ticket.crit { border-left-color:var(--crit); }
  .ticket.high { border-left-color:var(--high); }
  .ticket.normal { border-left-color:var(--norm); }
  .ticket.low { border-left-color:var(--low); }
  .ticket-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .ticket-id { font-family:var(--mono); font-size:10px; color:var(--muted); }
  .ticket-pri { font-family:var(--mono); font-size:9px; letter-spacing:1px; padding:2px 6px; border-radius:2px; text-transform:uppercase; }
  .ticket-pri.crit { background:var(--crit); color:#fff; }
  .ticket-pri.high { background:var(--high); color:#000; }
  .ticket-pri.normal { background:var(--norm); color:#fff; }
  .ticket-pri.low { background:var(--low); color:#fff; }
  .ticket-issue { font-size:13px; color:var(--text); margin-bottom:4px; }
  .ticket-meta { font-family:var(--mono); font-size:10px; color:var(--dim); display:flex; gap:12px; }
  .ticket-meta .status-resolved { color:var(--ok); }
  .ticket-meta .status-escalated { color:var(--high); }
  .ticket-meta .status-solved { color:var(--teal); }
  .ticket-meta .status-awaiting-human { color:var(--err); }

  /* AGENT CHAT */
  #chatbox { max-height:520px; overflow-y:auto; padding-right:6px; }
  #chatbox::-webkit-scrollbar { width:6px; }
  #chatbox::-webkit-scrollbar-track { background:var(--bg); }
  #chatbox::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  .msg { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
  .msg:last-child { border-bottom:none; }
  .msg .who { font-family:var(--mono); font-size:10px; color:var(--teal); width:130px; flex-shrink:0; line-height:1.5; }
  .msg .who .arrow { color:var(--muted); }
  .msg .who .to { color:var(--dim); }
  .msg .body { flex:1; font-size:12px; color:var(--text); line-height:1.5; }
  .msg .body .ticket-tag { display:inline-block; background:var(--panel2); border:1px solid var(--border2); padding:1px 6px; font-family:var(--mono); font-size:9px; color:var(--muted); margin-left:8px; border-radius:2px; }
  .msg .body .kind { display:inline-block; background:var(--bg); border:1px solid var(--border); padding:1px 5px; font-family:var(--mono); font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-right:6px; border-radius:2px; }
  .msg .body .kind.escalation { color:var(--high); border-color:var(--high); }
  .msg .body .kind.solution { color:var(--ok); border-color:var(--ok); }
  .msg .body .kind.halt { color:var(--err); border-color:var(--err); }
  .msg .body .kind.start { color:var(--norm); border-color:var(--norm); }
  .msg .body .kind.resolved { color:var(--teal); border-color:var(--teal); }
  .msg .body .kind.no-solution { color:var(--err); border-color:var(--err); }
  .msg .ts { font-family:var(--mono); font-size:9px; color:var(--muted); width:60px; flex-shrink:0; text-align:right; }

  .empty { font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; padding:30px 0; }
  .err-box { background:rgba(239,68,68,0.1); border:1px solid var(--err); color:var(--err); padding:12px; font-size:12px; border-radius:3px; margin-bottom:16px; }

  @media (max-width: 1100px) {
    .grid, .grid-3 { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h1>ARIA OPERATIONS · ACCESS</h1>
    <input id="user" type="text" placeholder="Username" autocomplete="username">
    <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
    <button onclick="doLogin()">SIGN IN</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div>
      <h1>ARIA OPERATIONS FLOOR</h1>
      <div class="meta" id="lastSync">syncing...</div>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn" onclick="loadAll()">REFRESH</button>
      <button class="btn" onclick="exportAudit()">EXPORT XLSX</button>
      <button class="btn" onclick="logout()">SIGN OUT</button>
    </div>
  </div>

  <!-- VISUAL OFFICE -->
  <div class="office">
    <svg class="office-svg" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
      <!-- floor -->
      <defs>
        <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0d1825"/>
          <stop offset="100%" stop-color="#050810"/>
        </linearGradient>
        <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a2b35"/>
          <stop offset="100%" stop-color="#0a121e"/>
        </linearGradient>
        <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1200" height="320" fill="url(#floorGrad)"/>

      <!-- horizon -->
      <line x1="0" y1="160" x2="1200" y2="160" stroke="#1a2b35" stroke-width="1" stroke-dasharray="2,4"/>
      <text x="20" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#6b7c87" letter-spacing="2">AROC OPERATIONS FLOOR · LIVE</text>

      <!-- 6 workstations -->
      <g id="seats">
        <!-- Each workstation: desk + monitor + avatar + label -->
        <g id="seat-ARIA" transform="translate(100,160)">
          <rect x="-40" y="0" width="80" height="40" rx="3" fill="url(#deskGrad)" stroke="#243a47"/>
          <rect x="-26" y="-22" width="52" height="22" rx="2" fill="#0a121e" stroke="#2dd4bf"/>
          <circle cx="0" cy="-11" r="6" fill="url(#screenGlow)"/>
          <circle cx="0" cy="-50" r="14" fill="#243a47" stroke="#2dd4bf" stroke-width="1.5" class="seat-active"/>
          <circle cx="0" cy="-46" r="4" fill="#2dd4bf"/>
          <text x="0" y="65" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#2dd4bf" letter-spacing="1">ARIA</text>
          <text x="0" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#6b7c87">brain</text>
        </g>

        <g id="seat-R1" transform="translate(280,160)">
          <rect x="-40" y="0" width="80" height="40" rx="3" fill="url(#deskGrad)" stroke="#243a47"/>
          <rect x="-26" y="-22" width="52" height="22" rx="2" fill="#0a121e" stroke="#3b82f6"/>
          <circle cx="0" cy="-11" r="5" fill="#3b82f6" class="seat-typing"/>
          <circle cx="0" cy="-50" r="14" fill="#243a47" stroke="#3b82f6" stroke-width="1.5"/>
          <circle cx="0" cy="-46" r="4" fill="#3b82f6"/>
          <text x="0" y="65" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#3b82f6" letter-spacing="1">R1</text>
          <text x="0" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#6b7c87">strict</text>
        </g>

        <g id="seat-R2" transform="translate(440,160)">
          <rect x="-40" y="0" width="80" height="40" rx="3" fill="url(#deskGrad)" stroke="#243a47"/>
          <rect x="-26" y="-22" width="52" height="22" rx="2" fill="#0a121e" stroke="#8b5cf6"/>
          <circle cx="0" cy="-11" r="5" fill="#8b5cf6" class="seat-typing"/>
          <circle cx="0" cy="-50" r="14" fill="#243a47" stroke="#8b5cf6" stroke-width="1.5"/>
          <circle cx="0" cy="-46" r="4" fill="#8b5cf6"/>
          <text x="0" y="65" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8b5cf6" letter-spacing="1">R2</text>
          <text x="0" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#6b7c87">fuzzy</text>
        </g>

        <g id="seat-R3" transform="translate(600,160)">
          <rect x="-40" y="0" width="80" height="40" rx="3" fill="url(#deskGrad)" stroke="#243a47"/>
          <rect x="-26" y="-22" width="52" height="22" rx="2" fill="#0a121e" stroke="#10b981"/>
          <circle cx="0" cy="-11" r="5" fill="#10b981" class="seat-typing"/>
          <circle cx="0" cy="-50" r="14" fill="#243a47" stroke="#10b981" stroke-width="1.5"/>
          <circle cx="0" cy="-46" r="4" fill="#10b981"/>
          <text x="0" y="65" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#10b981" letter-spacing="1">R3</text>
          <text x="0" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#6b7c87">vendor</text>
        </g>

        <g id="seat-SECURITY" transform="translate(780,160)">
          <rect x="-40" y="0" width="80" height="40" rx="3" fill="url(#deskGrad)" stroke="#243a47"/>
          <rect x="-26" y="-22" width="52" height="22" rx="2" fill="#0a121e" stroke="#ef4444"/>
          <circle cx="0" cy="-11" r="5" fill="#ef4444"/>
          <circle cx="0" cy="-50" r="14" fill="#243a47" stroke="#ef4444" stroke-width="1.5"/>
          <circle cx="0" cy="-46" r="4" fill="#ef4444"/>
          <text x="0" y="65" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#ef4444" letter-spacing="1">SEC</text>
          <text x="0" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#6b7c87">monitor</text>
        </g>

        <g id="seat-AUTOMATION" transform="translate(940,160)">
          <rect x="-40" y="0" width="80" height="40" rx="3" fill="url(#deskGrad)" stroke="#243a47"/>
          <rect x="-26" y="-22" width="52" height="22" rx="2" fill="#0a121e" stroke="#f59e0b"/>
          <circle cx="0" cy="-11" r="5" fill="#f59e0b"/>
          <circle cx="0" cy="-50" r="14" fill="#243a47" stroke="#f59e0b" stroke-width="1.5"/>
          <circle cx="0" cy="-46" r="4" fill="#f59e0b"/>
          <text x="0" y="65" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#f59e0b" letter-spacing="1">AUTO</text>
          <text x="0" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#6b7c87">workflows</text>
        </g>

        <g id="seat-AI_ENG" transform="translate(1100,160)">
          <rect x="-40" y="0" width="80" height="40" rx="3" fill="url(#deskGrad)" stroke="#243a47"/>
          <rect x="-26" y="-22" width="52" height="22" rx="2" fill="#0a121e" stroke="#14b8a6"/>
          <circle cx="0" cy="-11" r="5" fill="#14b8a6"/>
          <circle cx="0" cy="-50" r="14" fill="#243a47" stroke="#14b8a6" stroke-width="1.5"/>
          <circle cx="0" cy="-46" r="4" fill="#14b8a6"/>
          <text x="0" y="65" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#14b8a6" letter-spacing="1">AI-ENG</text>
          <text x="0" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#6b7c87">training</text>
        </g>
      </g>

      <!-- comm beams (rendered dynamically) -->
      <g id="beams"></g>
    </svg>
  </div>

  <!-- AUTONOMY + LEARNING -->
  <div class="grid-3">
    <div class="panel">
      <h2>ARIA AUTONOMY</h2>
      <div class="gauge">
        <div class="num" id="autonomyNum">—</div>
        <div class="lbl">% to fully autonomous</div>
        <div class="bar"><div id="autonomyBar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="panel">
      <h2>LEARNING VELOCITY</h2>
      <div class="gauge">
        <div class="num" id="velocityNum">—</div>
        <div class="lbl">bits / day (24h)</div>
        <div class="bar"><div id="velocityBar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="panel">
      <h2>HEALTH</h2>
      <div class="gauge">
        <div class="num" id="healthNum">—</div>
        <div class="lbl">% concern-free</div>
        <div class="bar"><div id="healthBar" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- AGENTS + TICKETS -->
  <div class="grid">
    <div class="panel">
      <h2>AGENTS · LEARNING RATE</h2>
      <div id="agents"></div>
    </div>
    <div class="panel">
      <h2>CRITICAL ISSUES (SORTED)</h2>
      <div id="tickets"></div>
    </div>
  </div>

  <!-- LIVE AGENT CHAT -->
  <div class="panel">
    <h2>LIVE AGENT-TO-AGENT COMMUNICATION</h2>
    <div id="chatbox"><div class="empty">Waiting for activity...</div></div>
  </div>

</div>

<script>
let TOKEN = localStorage.getItem('aperture_jwt') || '';
let POLL_TIMER = null;
const AGENT_LABELS = {
  l1:'L1 Helpdesk', l2:'L2 Support', l3:'L3 Engineer',
  security:'Security', networking:'Network', hardware:'Hardware',
  software:'Software', saas:'SaaS', m365:'M365',
  automation:'Automation', ai_eng:'AI Eng', prompt_eng:'Prompt Eng',
  business_ops:'Business Ops', audit:'Audit', revenue_opp:'Revenue',
  ux:'UX', kb:'Knowledge', memory:'Memory', rca:'RCA', escalation:'Escalation',
  R1:'Research-1', R2:'Research-2', R3:'Research-3',
  ARIA:'ARIA', 'research-pool':'Research Pool', user:'User', 'support-team':'Support'
};

if (TOKEN) tryShowApp();

function doLogin() {
  const u = document.getElementById('user').value.trim();
  const p = document.getElementById('pass').value;
  document.getElementById('login-err').textContent = '';
  fetch('/.netlify/functions/aperture-auth', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username:u, password:p })
  }).then(r => r.json()).then(j => {
    if (j.token) { TOKEN = j.token; localStorage.setItem('aperture_jwt', TOKEN); tryShowApp(); }
    else { document.getElementById('login-err').textContent = j.error || 'Login failed'; }
  }).catch(e => { document.getElementById('login-err').textContent = 'Network error'; });
}

function logout() {
  TOKEN = ''; localStorage.removeItem('aperture_jwt');
  if (POLL_TIMER) clearInterval(POLL_TIMER);
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
}

function tryShowApp() {
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  loadAll();
  POLL_TIMER = setInterval(loadAll, 4000);
}

async function loadAll() {
  const headers = { 'Authorization': 'Bearer ' + TOKEN };
  try {
    const [statusR, ticketsR, chatR] = await Promise.all([
      fetch('/.netlify/functions/aria-learning-status', { headers }),
      fetch('/.netlify/functions/aria-escalation?action=tickets'),
      fetch('/.netlify/functions/aria-escalation?action=chatlog')
    ]);
    if (statusR.status === 401) { logout(); return; }
    const status = await statusR.json().catch(() => ({}));
    const tickets = await ticketsR.json().catch(() => ({tickets:[]}));
    const chat = await chatR.json().catch(() => ({messages:[]}));
    renderStatus(status);
    renderTickets(tickets.tickets || []);
    renderChat(chat.messages || []);
    document.getElementById('lastSync').textContent = 'synced ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('lastSync').textContent = 'sync error: ' + e.message;
  }
}

function renderStatus(s) {
  const a = Math.round((s.autonomy || 0) * 100);
  document.getElementById('autonomyNum').textContent = a + '%';
  document.getElementById('autonomyBar').style.width = a + '%';
  const v = s.velocity24h || 0;
  document.getElementById('velocityNum').textContent = v;
  document.getElementById('velocityBar').style.width = Math.min(100, v * 2) + '%';
  const h = Math.round((1 - (s.concernRate || 0)) * 100);
  document.getElementById('healthNum').textContent = h + '%';
  document.getElementById('healthBar').style.width = h + '%';

  const agents = s.agents || {};
  const html = Object.keys(agents).sort((a,b)=>(agents[b]||0)-(agents[a]||0)).slice(0,20).map(k => {
    const v = agents[k] || 0;
    const pct = Math.min(100, v * 5);
    const label = AGENT_LABELS[k] || k;
    return `<div class="agent-row">
      <div class="agent-name">${escHtml(label)}<span class="role">${escHtml(k)}</span></div>
      <div class="agent-bar"><div style="width:${pct}%"></div></div>
      <div class="agent-pct">${v}</div>
    </div>`;
  }).join('');
  document.getElementById('agents').innerHTML = html || '<div class="empty">No agent activity yet</div>';
}

function renderTickets(tickets) {
  if (!tickets.length) { document.getElementById('tickets').innerHTML = '<div class="empty">No active tickets</div>'; return; }
  const html = tickets.slice(0, 30).map(t => {
    const cls = t.priority || 'normal';
    const status = (t.status || 'unknown').replace(/-/g,'-');
    const age = humanAge(t.createdAt);
    return `<div class="ticket ${cls}" onclick="viewTicket('${t.id}')">
      <div class="ticket-head">
        <span class="ticket-id">${escHtml(t.id)}</span>
        <span class="ticket-pri ${cls}">${escHtml(cls)}</span>
      </div>
      <div class="ticket-issue">${escHtml(t.issue || '')}</div>
      <div class="ticket-meta">
        <span class="status-${status}">● ${escHtml(status)}</span>
        <span>${age}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('tickets').innerHTML = html;
}

function renderChat(msgs) {
  if (!msgs.length) { document.getElementById('chatbox').innerHTML = '<div class="empty">Agents are quiet — no escalations pending</div>'; return; }
  const html = msgs.slice().reverse().slice(0, 80).reverse().map(m => {
    const time = new Date(m.ts || Date.now()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const fromL = AGENT_LABELS[m.from] || m.from || '?';
    const toL = AGENT_LABELS[m.to] || m.to || '?';
    const tag = m.ticketId ? `<span class="ticket-tag">${escHtml(m.ticketId)}</span>` : '';
    const kind = m.kind ? `<span class="kind ${escHtml(m.kind)}">${escHtml(m.kind)}</span>` : '';
    return `<div class="msg">
      <div class="who">${escHtml(fromL)}<br><span class="arrow">→</span> <span class="to">${escHtml(toL)}</span></div>
      <div class="body">${kind}${escHtml(m.text || '')}${tag}</div>
      <div class="ts">${time}</div>
    </div>`;
  }).join('');
  const box = document.getElementById('chatbox');
  const wasAtBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 40;
  box.innerHTML = html;
  if (wasAtBottom) box.scrollTop = box.scrollHeight;
}

function viewTicket(id) {
  fetch('/.netlify/functions/aria-escalation?action=ticket&id=' + encodeURIComponent(id))
    .then(r => r.json()).then(j => {
      if (j.ticket) alert(JSON.stringify(j.ticket, null, 2));
    });
}

function exportAudit() {
  const url = '/.netlify/functions/aria-learning-audit?format=csv&token=' + encodeURIComponent(TOKEN);
  window.open(url, '_blank');
}

function humanAge(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  if (ms < 60000) return Math.round(ms/1000) + 's ago';
  if (ms < 3600000) return Math.round(ms/60000) + 'm ago';
  if (ms < 86400000) return Math.round(ms/3600000) + 'h ago';
  return Math.round(ms/86400000) + 'd ago';
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
